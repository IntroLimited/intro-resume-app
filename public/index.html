<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intro — Candidate Parser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --white: #f5f3ef; --stone: #c8c2b4;
      --accent: #8b6f47; --green: #4a7c59; --border: rgba(255,255,255,0.08);
    }
    html, body { background: var(--black); color: var(--white); font-family: 'Cormorant Garamond', Georgia, serif; min-height: 100vh; }
    body { display: flex; flex-direction: column; align-items: center; padding: 3rem 1.5rem 5rem; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 20% 10%, rgba(139,111,71,0.05) 0%, transparent 60%); pointer-events: none; }
    .container { width: 100%; max-width: 660px; position: relative; z-index: 1; }
    header { margin-bottom: 2.5rem; text-align: center; }
    .wordmark { font-size: 0.65rem; font-family: 'DM Mono', monospace; letter-spacing: 0.35em; text-transform: uppercase; color: var(--stone); margin-bottom: 1.25rem; }
    h1 { font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 300; }
    h1 em { font-style: italic; color: var(--accent); }
    .subtitle { margin-top: 0.6rem; font-size: 0.95rem; color: var(--stone); font-style: italic; }
    .rule { width: 36px; height: 1px; background: var(--accent); margin: 2rem auto; opacity: 0.4; }
    .card { background: rgba(255,255,255,0.025); border: 1px solid var(--border); border-radius: 2px; padding: 2.25rem; }
    .field { margin-bottom: 1.6rem; }
    label { display: block; font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--stone); margin-bottom: 0.55rem; }
    input[type="text"], select, textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); border-radius: 1px; padding: 0.75rem 1rem; font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; color: var(--white); outline: none; transition: border-color 0.2s; -webkit-appearance: none; appearance: none; }
    input[type="text"]::placeholder, textarea::placeholder { color: rgba(200,194,180,0.3); font-style: italic; }
    input[type="text"]:focus, select:focus, textarea:focus { border-color: rgba(139,111,71,0.45); }
    .select-wrap { position: relative; }
    .select-wrap::after { content: '↓'; position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--stone); font-size: 0.8rem; pointer-events: none; font-family: 'DM Mono', monospace; }
    select { cursor: pointer; padding-right: 2.5rem; }
    select option { background: #1a1714; color: var(--white); }
    textarea { resize: vertical; min-height: 80px; line-height: 1.55; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.6rem; }
    .row .field { margin-bottom: 0; }
    .dropzone { border: 1px dashed rgba(255,255,255,0.13); border-radius: 2px; padding: 2.25rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.25s; background: rgba(255,255,255,0.015); user-select: none; }
    .dropzone:hover, .dropzone.drag-over { border-color: rgba(139,111,71,0.55); background: rgba(139,111,71,0.04); }
    .dropzone.has-file { border-color: rgba(74,124,89,0.55); background: rgba(74,124,89,0.04); border-style: solid; }
    .drop-icon { font-size: 1.6rem; margin-bottom: 0.6rem; opacity: 0.4; font-family: 'DM Mono', monospace; }
    .drop-label { font-size: 1rem; color: var(--stone); font-style: italic; }
    .drop-label strong { color: var(--white); font-style: normal; }
    .drop-hint { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(200,194,180,0.35); margin-top: 0.4rem; }
    .file-confirmed { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--green); margin-top: 0.5rem; }
    .form-divider { border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 1.8rem 0; }
    .section-label { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(200,194,180,0.35); margin-bottom: 1.25rem; }
    .btn { width: 100%; padding: 1rem; background: var(--accent); border: none; border-radius: 1px; font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase; color: #0a0a0a; cursor: pointer; transition: all 0.2s; margin-top: 1.6rem; }
    .btn:hover:not(:disabled) { background: #9d7f55; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .status { margin-top: 1.25rem; padding: 0.9rem 1.1rem; border-radius: 1px; font-size: 0.9rem; line-height: 1.6; display: none; }
    .status.visible { display: block; }
    .status.processing { background: rgba(139,111,71,0.07); border: 1px solid rgba(139,111,71,0.18); color: var(--stone); font-style: italic; }
    .status.success { background: rgba(74,124,89,0.08); border: 1px solid rgba(74,124,89,0.25); color: #7fba94; }
    .status.error { background: rgba(139,58,58,0.08); border: 1px solid rgba(139,58,58,0.25); color: #c07878; }
    .result-card { margin-top: 1.5rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 2px; padding: 1.75rem 2.25rem; display: none; }
    .result-card.visible { display: block; }
    .result-eyebrow { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(200,194,180,0.35); margin-bottom: 1.25rem; }
    .result-block { margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .result-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .result-block-label { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; opacity: 0.8; }
    .result-block-text { font-size: 0.92rem; font-weight: 300; color: rgba(245,243,239,0.65); line-height: 1.7; white-space: pre-wrap; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 1px solid rgba(139,111,71,0.25); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; vertical-align: middle; margin-right: 0.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { margin-top: 3rem; text-align: center; font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(200,194,180,0.18); }
    @media (max-width: 520px) { body { padding: 2rem 1rem 4rem; } .card { padding: 1.5rem 1.25rem; } .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <p class="wordmark">Intro Limited</p>
      <h1>Candidate <em>Parser</em></h1>
      <p class="subtitle">Drop a resume. Notes saved to Notion automatically.</p>
    </header>
    <div class="rule"></div>
    <div class="card">
      <p class="section-label">Candidate</p>
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="candidateName" placeholder="e.g. Torreon Everett Meredith" />
      </div>
      <div class="field">
        <label>Role this is for</label>
        <input type="text" id="roleFor" placeholder="e.g. GM – NOT Beauty" />
      </div>
      <div class="row">
        <div class="field">
          <label>Recruiter</label>
          <div class="select-wrap">
            <select id="recruiter">
              <option value="AW">Alyssa (AW)</option>
              <option value="KB">Kiki (KB)</option>
              <option value="BL">Bastien (BL)</option>
              <option value="MA">Michael (MA)</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Stage Tag</label>
          <div class="select-wrap">
            <select id="stageTag">
              <option value="Intro Interviewed">Intro Interviewed</option>
              <option value="General Connection">General Connection</option>
              <option value="Intro Dismissed">Intro Dismissed</option>
              <option value="Remove him/herself">Remove him/herself</option>
            </select>
          </div>
        </div>
      </div>
      <hr class="form-divider" />
      <p class="section-label">Resume</p>

      <!-- Hidden file input -->
      <input type="file" id="resumeFile" accept=".pdf,.doc,.docx" style="display:none" />

      <div class="field">
        <div class="dropzone" id="dropzone">
          <div class="drop-icon">↓</div>
          <p class="drop-label">Drop resume here or <strong>browse</strong></p>
          <p class="drop-hint">PDF · DOC · DOCX</p>
          <p class="file-confirmed" id="fileName"></p>
        </div>
      </div>
      <hr class="form-divider" />
      <p class="section-label">Additional Notes <span style="font-family:serif;font-style:italic;text-transform:none;letter-spacing:0;font-size:0.75rem;opacity:0.55"> — optional</span></p>
      <div class="field">
        <textarea id="highlights" placeholder="e.g. Highlight experience at companies over $100M revenue."></textarea>
      </div>
      <button class="btn" id="submitBtn" onclick="submitResume()">Parse &amp; Save to Notion</button>
      <div class="status" id="status"></div>
    </div>
    <div class="result-card" id="resultCard">
      <p class="result-eyebrow">Saved to Notion</p>
      <div id="resultContent"></div>
    </div>
    <footer>Intro Limited &nbsp;·&nbsp; Internal Tool</footer>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('resumeFile');
    const fileNameEl = document.getElementById('fileName');
    let selectedFile = null;

    // Click on dropzone triggers file picker
    dropzone.addEventListener('click', function() {
      fileInput.click();
    });

    // File picked via browser
    fileInput.addEventListener('change', function() {
      if (this.files && this.files[0]) {
        handleFile(this.files[0]);
      }
    });

    // Drag over
    dropzone.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.stopPropagation();
      this.classList.add('drag-over');
    });

    // Drag leave
    dropzone.addEventListener('dragleave', function(e) {
      e.stopPropagation();
      this.classList.remove('drag-over');
    });

    // Drop
    dropzone.addEventListener('drop', function(e) {
      e.preventDefault();
      e.stopPropagation();
      this.classList.remove('drag-over');
      var files = e.dataTransfer.files;
      if (files && files[0]) {
        handleFile(files[0]);
      }
    });

    function handleFile(file) {
      selectedFile = file;
      fileNameEl.textContent = '✓ ' + file.name;
      dropzone.classList.add('has-file');
    }

    function setStatus(type, html) {
      var el = document.getElementById('status');
      el.className = 'status visible ' + type;
      el.innerHTML = html;
    }

    function showResult(data) {
      var card = document.getElementById('resultCard');
      var content = document.getElementById('resultContent');
      card.classList.add('visible');
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      var sections = [
        { label: 'Basics', key: 'basics' },
        { label: 'Strong Points', key: 'strong_points' },
        { label: 'Potential Challenges', key: 'potential_challenges' },
        { label: 'Compensation', key: 'compensation' }
      ];
      content.innerHTML = sections.map(function(s) {
        return '<div class="result-block"><p class="result-block-label">' + s.label + '</p><p class="result-block-text">' + (data[s.key] || '—').replace(/</g, '&lt;') + '</p></div>';
      }).join('');
    }

    async function submitResume() {
      var name = document.getElementById('candidateName').value.trim();
      var roleFor = document.getElementById('roleFor').value.trim();
      var recruiter = document.getElementById('recruiter').value;
      var stageTag = document.getElementById('stageTag').value;
      var highlights = document.getElementById('highlights').value.trim();
      var btn = document.getElementById('submitBtn');

      if (!name) { setStatus('error', 'Please enter the candidate\'s full name.'); return; }
      if (!roleFor) { setStatus('error', 'Please enter the role this is for.'); return; }
      if (!selectedFile) { setStatus('error', 'Please upload a resume — click or drop a file in the box above.'); return; }

      btn.disabled = true;
      btn.textContent = 'Processing…';
      document.getElementById('resultCard').classList.remove('visible');
      setStatus('processing', '<span class="spinner"></span> Reading resume and generating notes…');

      var formData = new FormData();
      formData.append('candidate_name', name);
      formData.append('role_for', roleFor);
      formData.append('recruiter', recruiter);
      formData.append('stage_tag', stageTag);
      formData.append('highlights', highlights);
      formData.append('resume', selectedFile);

      try {
        var res = await fetch('/api/parse', { method: 'POST', body: formData });
        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong.');
        setStatus('success', '✓ Notes saved to Notion for <strong>' + name + '</strong> &nbsp;·&nbsp; Stage set to <strong>' + stageTag + '</strong>');
        showResult(data);
      } catch(err) {
        setStatus('error', '✗ ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Parse & Save to Notion';
      }
    }
  </script>
</body>
</html>
